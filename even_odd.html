<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Even or Odd Checker</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 50px;
            padding: 20px;
            background-color: #f4f4f9;
        }
        .container {
            max-width: 400px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        input, button {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            box-sizing: border-box;
            border-radius: 4px;
            border: 1px solid #ccc;
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #0056b3;
        }
        #result {
            font-weight: bold;
            margin-top: 15px;
            font-size: 18px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Even or Odd Checker</h2>
    <label for="numberInput">Enter a number:</label>
    <input type="number" id="numberInput" placeholder="Type a number here...">
    <button id="checkBtn">Check Number</button>
    
    <div id="result"></div>
</div>

<script>
    // 1. Select the DOM elements
    const numberInput = document.getElementById('numberInput');
    const checkBtn = document.getElementById('checkBtn');
    const resultDiv = document.getElementById('result');

    // 2. Add an event listener to the button
    checkBtn.addEventListener('click', function() {
        // Get the value from the input field and convert it to a number
        const num = parseInt(numberInput.value);

        // 3. Validation: Check if the input is actually a number
        if (isNaN(num)) {
            resultDiv.textContent = "Please enter a valid number! ⚠️";
            resultDiv.style.color = "orange";
            return; // Stop execution
        }

        // 4. Core Logic & DOM Manipulation
        if (num % 2 === 0) {
            resultDiv.textContent = `${num} is an EVEN number. 🔵`;
            resultDiv.style.color = "green";
        } else {
            resultDiv.textContent = `${num} is an ODD number. 🔴`;
            resultDiv.style.color = "red";
        }
    });
</script>

</body>
</html>
